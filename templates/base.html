<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image to Excel</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap">
</head>
<body style="background-color: #f8fafc; font-family: 'Poppins', sans-serif; margin: 0; padding: 0;">

    <header style="background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: white; text-align: center; padding: 30px 10px;">
        <h2 style="margin: 0; font-size: 28px;">📊 AI Image to Excel Converter</h2>
        <p style="margin: 5px 0 0 0; opacity: 0.9;">Convert tables in images to Excel files in seconds</p>
    </header>

    <main style="max-width: 600px; margin: 40px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);">
        {% block content %} {% endblock %}
    </main>

</body>
</html>
